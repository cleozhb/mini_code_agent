id: L1-add-classmethod
level: 1
description: |
  给 Config 类加一个 `from_env()` 类方法：从环境变量读 APP_HOST（默认 "localhost"）、
  APP_PORT（默认 8080，注意从字符串转成 int）、APP_DEBUG（"1"/"true"/"yes" 视为 True，
  其余视为 False）构造一个 Config 实例；补上相应测试。

  文件位置要求：
  - 修改已有的 `config.py`
  - 新增测试文件命名为 `test_config.py`，放在**工作区根目录**（与 config.py 并列），
    或 `tests/test_config.py`（两种都接受）
expected_files:
  # 只列核心产出；测试文件位置允许 test_config.py / tests/test_config.py 二选一，
  # 不列进 expected_files 避免 edit_precision/recall 因为合理的目录选择被误判。
  - config.py
max_steps: 20
max_tokens: 50000
max_wall_time_seconds: 300
tags:
  - single-file
  - python
  - classmethod
